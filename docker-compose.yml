version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: filotakip_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: filotakip
      POSTGRES_USER: filotakip_user
      POSTGRES_PASSWORD: filotakip_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: filotakip_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://filotakip_user:filotakip_pass@db:5432/filotakip
      JWT_SECRET: degistir_bunu_guclu_bir_secret_ile
      JWT_EXPIRES_IN: 7d
      UPLOAD_PATH: /app/uploads
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./frontend
    container_name: filotakip_frontend
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
